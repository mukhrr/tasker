<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Tasker for GitHub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Loading state -->
    <div id="loading" class="view">
      <div class="header">
        <div class="header-icon">T</div>
        <div>
          <h1>Tasker</h1>
          <p class="subtitle">for GitHub</p>
        </div>
      </div>
      <div class="body">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Login view -->
    <div id="login-view" class="view hidden">
      <div class="header">
        <div class="header-icon">T</div>
        <div>
          <h1>Tasker</h1>
          <p class="subtitle">for GitHub</p>
        </div>
      </div>
      <div class="body">
        <button id="github-login-btn" class="btn btn-github">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          Sign in with GitHub
        </button>
        <div id="login-error" class="error hidden"></div>
      </div>
    </div>

    <!-- Logged in view -->
    <div id="logged-in-view" class="view hidden">
      <div class="header">
        <div class="header-icon">T</div>
        <div>
          <h1>Tasker</h1>
          <p class="subtitle">for GitHub</p>
        </div>
      </div>
      <div class="body">
        <div class="user-card">
          <div id="user-avatar" class="user-avatar"></div>
          <div class="user-info">
            <span class="user-label">Signed in as</span>
            <span id="user-email" class="user-email"></span>
          </div>
        </div>
        <div class="hint-card">
          <div class="hint-illustration">
            <div class="hint-browser">
              <div class="hint-browser-bar">
                <span class="hint-browser-dot"></span>
                <span class="hint-browser-dot"></span>
                <span class="hint-browser-dot"></span>
              </div>
              <div class="hint-browser-body">
                <div class="hint-sidebar">
                  <div class="hint-sidebar-line"></div>
                  <div class="hint-sidebar-line short"></div>
                  <div class="hint-widget">
                    <span class="hint-widget-label">Tasker</span>
                    <span class="hint-widget-badge">
                      <span class="hint-widget-dot"></span>
                      Status
                    </span>
                  </div>
                </div>
                <div class="hint-main">
                  <div class="hint-main-line"></div>
                  <div class="hint-main-line med"></div>
                  <div class="hint-main-line short"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="hint-text">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="7"/>
              <path d="M8 5v3M8 11h.01"/>
            </svg>
            <span>Look for the <strong>Tasker</strong> widget in the sidebar of any GitHub issue or PR</span>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-secondary">Sign Out</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
