# Fly.io config for the Tasker proposals worker.
# Long-running Node process — no HTTP, no concurrency, just a tight poll loop.

app = "tasker-proposals-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  NODE_ENV = "production"
  POLL_INTERVAL_MS = "1500"
  POLL_IDLE_INTERVAL_MS = "60000"

# Single instance — the worker uses an atomic Supabase claim, but two
# instances would just double the GitHub events polling for no benefit.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

# No public port; this process never accepts traffic.
# (Omit the [http_service] block on purpose.)

[deploy]
  strategy = "immediate"
